name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    name: JS — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: js/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  python:
    name: Python — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e ".[dev]" build
      - run: mypy identify_sdk
      - run: python -m build
