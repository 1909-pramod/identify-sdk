name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  js:
    name: JS — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run typecheck
      - run: npm run build

  python:
    name: Python — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install --upgrade pip setuptools
      - run: pip install -e ".[dev]" build
      - run: mypy identify_sdk
      - run: python -m build

  go:
    name: Go — vet, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...
